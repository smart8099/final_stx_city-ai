<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CityAssist Widget Test</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #f5f5f5; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #555; margin-bottom: 1.5rem; }
    label { font-size: 0.9rem; font-weight: 600; }
    select { margin-left: 0.5rem; padding: 0.3rem 0.6rem; border-radius: 4px; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h1>CityAssist — Widget Test Page</h1>
  <p>The chat widget should appear in the bottom-right corner.</p>

  <label>City:
    <select onchange="location.search='?tenant='+this.value">
      <option value="city-of-pharr">City of Pharr</option>
      <option value="city-of-edinburg">City of Edinburg</option>
    </select>
  </label>

  <script>
    const tenant = new URLSearchParams(location.search).get('tenant') || 'city-of-pharr';
    const s = document.createElement('script');
    s.src = '/static/widget.js';
    s.setAttribute('data-tenant', tenant);
    s.setAttribute('data-api-url', location.origin);
    s.setAttribute('data-ws-url', location.origin.replace(/^http(s?)/, 'ws$1').replace(/:3000/, ':3001'));
    s.async = true;
    document.body.appendChild(s);
  </script>
</body>
</html>
